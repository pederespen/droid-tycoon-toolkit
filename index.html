<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/droid.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A toolkit and reference for the Droid Tycoon Fortnite game: droid roster, economy stats, rebirth requirements, Nova Shop, cosmetics, plus a Super Rebirth cycle finder and droid planner."
    />
    <title>Droid Tycoon Toolkit</title>
    <script>
      // Apply the saved (or system) theme before paint to avoid a flash.
      ;(() => {
        const saved = localStorage.getItem('theme')
        const prefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)',
        ).matches
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
